<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepGuardX | Forensic Media Authentication</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --brand: #0f172a;
            --accent: #2563eb;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        nav {
            background: var(--card);
            padding: 1.25rem 10%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--brand);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; color: var(--brand); letter-spacing: -1px; }
        .hero p { color: var(--text-dim); font-size: 1.1rem; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
        }

        /* --- UPLOAD ZONE --- */
        .upload-zone {
            display: block;
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 80px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fafafa;
        }
        .upload-zone:hover { border-color: var(--accent); background: #f8fbff; }
        .upload-zone i { font-size: 48px; color: var(--accent); margin-bottom: 15px; }

        .btn-detect {
            background: var(--brand);
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-detect:hover { background: #000; transform: translateY(-1px); }

        /* --- RESULTS SECTION --- */
        .results-section { display: none; margin-top: 40px; animation: fadeIn 0.6s ease forwards; }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 30px;
        }

        .viz-box { 
            background: #f8fafc; 
            border-radius: 14px; 
            padding: 15px; 
            border: 1px solid var(--border);
            text-align: center;
        }
        .viz-box img { width: 100%; border-radius: 10px; display: block; margin-top: 10px; }
        .viz-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .badge {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-fake { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
        .badge-real { background: #dcfce7; color: var(--success); border: 1px solid #bbf7d0; }

        /* --- INFO BLOCKS --- */
        .info-block {
            background: #f8fafc;
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--border);
            height: 100%;
        }

        /* --- PROGRESS --- */
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 20px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 1.2s cubic-bezier(0.22, 1, 0.36, 1); }

        /* --- LOADER --- */
        .analyzing-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .loader { width: 44px; height: 44px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="ph-fill ph-shield-check"></i> DeepGuardX</div>
        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-dim);">Secure Forensic Node</div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>DeepGuardX</h1>
            <p>Enterprise-grade multimodal deepfake identification engine.</p>
        </div>

        <div class="card" id="uploadCard">
            <div class="analyzing-overlay" id="loaderOverlay">
                <div class="loader"></div>
                <p style="margin-top: 20px; font-weight: 700; color: var(--brand); letter-spacing: 1px;">PROCESSING FORENSIC DATA...</p>
            </div>

            <form id="uploadForm">
                <label for="fileInput" class="upload-zone" id="dropZone">
                    <i class="ph ph-plus-circle"></i>
                    <h3 id="fileLabel">Select Media Sample</h3>
                    <p style="font-size: 0.9rem; color: var(--text-dim); margin-top: 8px;">Upload image or audio for neural analysis</p>
                    <input type="file" id="fileInput" name="file" accept="image/*,audio/*">
                </label>
                <button type="submit" class="btn-detect">INITIATE DETECTION</button>
            </form>
        </div>

        <section class="results-section" id="resultsSection">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <div>
                        <span style="font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--text-dim); font-weight: 600;">SESSION ID: <span id="reportId" style="color: var(--brand);"></span></span>
                        <h2 style="font-size: 1.5rem; font-weight: 800; margin-top: 4px;">Analysis Results</h2>
                    </div>
                    <div id="predictionBadge"></div>
                </div>

                <div class="report-grid">
                    <div class="viz-box">
                        <div class="viz-label">Source Input</div>
                        <div id="inputMediaPreview" style="margin-top: 10px;"></div>
                    </div>
                    <div class="viz-box">
                        <div class="viz-label">Grad-CAM Heatmap</div>
                        <img id="gradcamImg" src="">
                    </div>
                </div>

                <div class="report-grid">
                    <div class="info-block">
                        <div class="viz-label" style="margin-bottom: 12px;">Forensic Justification</div>
                        <p id="explanationText" style="font-size: 0.95rem; color: var(--text-main);"></p>
                    </div>
                    <div class="info-block">
                        <div class="viz-label" style="margin-bottom: 12px;">Neural Confidence</div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <span id="confidenceVal" style="font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1;">0%</span>
                            <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-dim);">PROBABILITY</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="confidenceBar"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const loaderOverlay = document.getElementById('loaderOverlay');
        const resultsSection = document.getElementById('resultsSection');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) fileLabel.innerText = e.target.files[0].name;
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            loaderOverlay.style.display = 'flex';

            try {
                const formData = new FormData();
                formData.append(file.type.startsWith('image') ? 'image' : 'audio', file);
                
                // Real request to your /predict endpoint
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();

                setTimeout(() => {
                    loaderOverlay.style.display = 'none';
                    showResults(data, file);
                }, 1500);

            } catch (err) {
                alert("Backend Connection Offline");
                loaderOverlay.style.display = 'none';
            }
        });

        function showResults(data, file) {
            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });

            const isFake = data.prediction.toUpperCase() === 'FAKE';
            document.getElementById('predictionBadge').innerHTML = `
                <span class="badge ${isFake ? 'badge-fake' : 'badge-real'}">
                    ${isFake ? 'Deepfake Detected' : 'Verified Authentic'}
                </span>
            `;

            document.getElementById('explanationText').innerText = data.explanation;
            document.getElementById('gradcamImg').src = data.gradcam_image + '?t=' + Date.now();
            
            const confPercent = (data.confidence * 100).toFixed(1);
            document.getElementById('confidenceVal').innerText = confPercent + '%';
            
            setTimeout(() => {
                document.getElementById('confidenceBar').style.width = confPercent + '%';
            }, 100);

            const previewDiv = document.getElementById('inputMediaPreview');
            previewDiv.innerHTML = "";
            if(file.type.startsWith('image')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.style.width = "100%";
                img.style.borderRadius = "8px";
                previewDiv.appendChild(img);
            } else {
                previewDiv.innerHTML = '<div style="padding:40px; text-align:center;"><i class="ph ph-waveform" style="font-size:48px; color:var(--accent);"></i></div>';
            }
            document.getElementById('reportId').innerText = 'DG-' + Math.floor(Math.random()*9000 + 1000);
        }
    </script>
</body>
</html>
